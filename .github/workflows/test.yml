name: Unit Tests

on: [pull_request]

env:
  XCODE_VERSION: 26.0.1
  IOS_SIMULATOR_NAME: iPhone 17
  IOS_SIMULATOR_OS: 26.1

permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Display Swift and Xcode versions and available simulators
        run: |
          swift --version
          xcodebuild -version
          xcrun simctl list devices

      - name: Install lcov
        run: brew install lcov

      - name: Run tests with code coverage
        run: |
          xcodebuild \
            -scheme YouVersionPlatform \
            -destination 'platform=iOS Simulator,name=${{ env.IOS_SIMULATOR_NAME }},OS=${{ env.IOS_SIMULATOR_OS }}' \
            -derivedDataPath DerivedData \
            -resultBundlePath TestResults.xcresult \
            -enableCodeCoverage YES \
            test

      - name: Generate LCOV coverage report
        id: coverage
        uses: sersoft-gmbh/swift-coverage-action@v5
        with:
          search-paths: ./DerivedData
          output: ./coverage
          format: lcov

      - name: Report coverage on PR
        uses: zgosalvez/github-actions-report-lcov@v4
        with:
          coverage-files: ./coverage/*.lcov
          minimum-coverage: 0
          artifact-name: code-coverage-report
          github-token: ${{ secrets.GITHUB_TOKEN }}
          update-comment: true
