name: Code Coverage

on:
  workflow_run:
    workflows: ["Release"]
    types:
      - completed
    branches:
      - main

env:
  XCODE_VERSION: 26.0.1
  IOS_SIMULATOR_NAME: iPhone 17
  IOS_SIMULATOR_OS: 26.1

permissions:
  contents: write

jobs:
  coverage:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ssh-key: ${{ secrets.RELEASE_SSH_KEY }}

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Run tests with code coverage
        run: |
          xcodebuild \
            -scheme YouVersionPlatform \
            -destination 'platform=iOS Simulator,name=${{ env.IOS_SIMULATOR_NAME }},OS=${{ env.IOS_SIMULATOR_OS }}' \
            -derivedDataPath DerivedData \
            -resultBundlePath TestResults.xcresult \
            -enableCodeCoverage YES \
            test

      - name: Install lcov
        run: brew install lcov

      - name: Generate LCOV coverage report
        id: coverage-files
        uses: sersoft-gmbh/swift-coverage-action@v5
        with:
          search-paths: ./DerivedData
          output: ./coverage
          format: lcov

      - name: Calculate coverage percentage
        id: coverage
        run: |
          # Find the lcov file
          LCOV_FILE=$(find ./coverage -name "*.lcov" | head -1)
          if [ -z "$LCOV_FILE" ]; then
            echo "No lcov file found"
            echo "percentage=0" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Calculate coverage from lcov file
          COVERAGE=$(awk -F: '/^LF:/{lf+=$2} /^LH:/{lh+=$2} END{if(lf>0) printf "%.1f", (lh/lf)*100; else print "0"}' "$LCOV_FILE")
          echo "percentage=$COVERAGE" >> $GITHUB_OUTPUT
          echo "Coverage: $COVERAGE%"

      - name: Update coverage JSON for shields.io
        run: |
          mkdir -p .github/badges
          COVERAGE="${{ steps.coverage.outputs.percentage }}"

          # Determine color based on coverage
          if (( $(echo "$COVERAGE >= 80" | bc -l) )); then
            COLOR="brightgreen"
          elif (( $(echo "$COVERAGE >= 60" | bc -l) )); then
            COLOR="yellow"
          elif (( $(echo "$COVERAGE >= 40" | bc -l) )); then
            COLOR="orange"
          else
            COLOR="red"
          fi

          # Create JSON endpoint for shields.io
          cat > .github/badges/coverage.json << EOF
          {
            "schemaVersion": 1,
            "label": "coverage",
            "message": "${COVERAGE}%",
            "color": "${COLOR}"
          }
          EOF

      - name: Commit coverage data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/badges/coverage.json
          git diff --staged --quiet || git commit -m "chore: update coverage badge [skip ci]"
          git push
