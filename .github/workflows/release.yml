name: Release

on:
  push:
    branches:
      - main

env:
  XCODE_VERSION: latest-stable
  IOS_SIMULATOR_NAME: iPhone 17
  IOS_SIMULATOR_OS: latest

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  test:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Ensure iOS Simulator runtime is available
        run: |
          if ! xcrun simctl list runtimes | grep -q "iOS.*26"; then
            echo "iOS 26 runtime not found. Downloading..."
            xcodebuild -downloadPlatform iOS
          else
            echo "iOS 26 runtime is already installed."
          fi

      - name: Run tests
        run: |
          xcodebuild \
            -scheme YouVersionPlatform \
            -destination 'platform=iOS Simulator,name=${{ env.IOS_SIMULATOR_NAME }},OS=${{ env.IOS_SIMULATOR_OS }}' \
            -derivedDataPath DerivedData \
            -enableCodeCoverage NO \
            test

  release:
    needs: test
    runs-on: macos-latest

    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: false

      - name: Install CocoaPods
        run: gem install cocoapods

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Persist credentials for future commit (write)
          # persist-credentials: false
          ssh-key: ${{ secrets.RELEASE_SSH_KEY }}

      - name: Install npm dependencies
        run: npm ci

      - name: Verify scripts are executable
        run: |
          chmod +x scripts/update-pod-versions.sh
          chmod +x scripts/publish-pods.sh

      - name: Setup Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin git@github.com:youversion/platform-sdk-swift.git

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # TODO: Remove CocoaPods token once we confirm we're not using it anymore
          COCOAPODS_TRUNK_TOKEN: ${{ secrets.COCOAPODS_TRUNK_TOKEN }}
          GIT_AUTHOR_NAME: "github-actions[bot][release]"
          GIT_AUTHOR_EMAIL: "github-actions[bot][release]@users.noreply.github.com"
          GIT_COMMITTER_NAME: "github-actions[bot][release]"
          GIT_COMMITTER_EMAIL: "github-actions[bot][release]@users.noreply.github.com"
        run: npx semantic-release
